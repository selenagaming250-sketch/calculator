<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          .calculator { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; max-width: 300px; margin: 20px auto; }
  input#display { grid-column: span 4; padding: 10px; font-size: 20px; text-align: right; }
  button { padding: 15px; font-size: 18px; cursor: pointer; }
  .operator { background-color: #f0f0f0; }
  .equals { background-color: #4CAF50; color: white; }
  .clear { background-color: #f44336; color: white; }

    </style>
</head>
<body>
    localhost:5500/Pages/calculator.html

    <div class=info>">
     <a href="./About.html">About</a>
     <a href="./Contact.html">Contact</a>   
     <a href="./calculator.html">Calculator</a>     
     <a href="./index.html">Home</a>
     <h1> hello man </h1>
     <h2> try  </h2>
        
    </div>

    <div class=calculate>
         <input type="text" id="display" disabled>
         <button onclick="calculate()">Calculate</button>


    </div>
    <div class="top-section">
        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>     
        <button onclick="clearDisplay()">Del</button>
    </div>

    <div class="middle-section"> 
        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>

    </div>
       

    <div class="bottom-section">
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>    

    </div>
        
    <div class="bottom-section">
        <button onclick="append('0')">0</button>
        <button onclick="append('+')">+</button>
        <button onclick="append('-')">-</button>
    </div>

    <div class="try">
        <button onclick="calculate()">=</button>
        <button onclick="clearDisplay()">C</button> 
        <button onclick="append('*')">*</button>
        <button onclick="append('/')">/</button>    
    </div>
    <script>
  let display = document.getElementById('display');

  function append(value) {
    display.value += value;
  }

  function clearDisplay() {
    display.value = '';
  }

  function calculate() {
    try {
      // Note: eval() executes the string as JavaScript code
      display.value = eval(display.value);
    } catch (error) {
      display.value = 'Error';
    }
  }
</script>

</body>
</html>
